---
layout: default
---
<section class="page-hero compact">
  <div class="container">
    <p class="eyebrow">Project</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}<p class="lead">{{ page.summary }}</p>{% endif %}
    {% if page.tags %}
      <div class="tag-row">
        {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
      </div>
    {% endif %}
  </div>
</section>

<section class="section">
  <div class="container content-grid">
    <article class="prose">
      {{ content }}
    </article>
    <aside class="card sticky-card">
      <h2>Project Focus</h2>
      <p>{{ page.focus | default: page.summary }}</p>
      {% if page.link %}<a class="button full" href="{{ page.link }}">View Project</a>{% endif %}
    </aside>
  </div>
</section>
